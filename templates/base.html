<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Конференція{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎓 ConfReg</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
               <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
    <li class="nav-item">
        <a class="nav-link text-white" href="/">Головна</a>
    </li>
    
    {% if current_user %}
        <li class="nav-item">
            <a class="nav-link text-white" href="/participants">Учасники</a>
        </li>
        <li class="nav-item">
            <span class="nav-link text-info fw-semibold">👤 {{ current_user }}</span>
        </li>
        <li class="nav-item">
            <a class="nav-link text-danger fw-semibold" href="/logout">Вихід</a>
        </li>
    {% else %}
        <li class="nav-item">
            <a class="nav-link text-white" href="/register-page">Реєстрація</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="/login-page">Вхід</a>
        </li>
    {% endif %}
</ul>
                      
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <small>&copy; 2026 Система реєстрації на конференції. Всі права захищені.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
